<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Deep coffee background -->
  <rect width="32" height="32" rx="4" fill="#120D0A"/>

  <!-- Outer globe ring -->
  <circle cx="16" cy="16" r="12.5" fill="none" stroke="#2A211B" stroke-width="1.5"/>

  <!-- Broken crosshair — horizontal (gap at center for the inner ring) -->
  <line x1="3.5" y1="16" x2="10" y2="16" stroke="#3A2E27" stroke-width="1"/>
  <line x1="22" y1="16" x2="28.5" y2="16" stroke="#3A2E27" stroke-width="1"/>

  <!-- Broken crosshair — vertical -->
  <line x1="16" y1="3.5" x2="16" y2="10" stroke="#3A2E27" stroke-width="1"/>
  <line x1="16" y1="22" x2="16" y2="28.5" stroke="#3A2E27" stroke-width="1"/>

  <!-- Amber targeting ring -->
  <circle cx="16" cy="16" r="6" fill="none" stroke="#C68A3B" stroke-width="2"/>

  <!-- Center: live-alert dot -->
  <circle cx="16" cy="16" r="2.5" fill="#dc2626"/>

  <!-- Live pulse indicator — top-right quadrant -->
  <circle cx="24" cy="8" r="2.8" fill="#C68A3B" opacity="0.15"/>
  <circle cx="24" cy="8" r="1.8" fill="#C68A3B"/>
</svg>
